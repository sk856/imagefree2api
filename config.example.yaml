# Imagefree2API 配置
# 复制此文件为 config.yaml 并填入实际值
# config.yaml 已被 .gitignore 忽略，不会提交到 Git

# ── 服务配置 ──
server:
  host: "0.0.0.0"
  port: 7861

# ── Imagefree 目标网站 ──
imagefree:
  base_url: "https://imagefree.org"
  site_key: "0x4AAAAAAB_58B_Bds-jVf2h"

# ── Capsolver 打码服务（必填） ──
# 注册: https://capsolver.com → Dashboard 复制 API Key
capsolver:
  api_key: "CAP-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── API 访问密钥（必填，自行修改） ──
# 客户端调用 API 时需在 Authorization header 中传入此 key
api_key: "sk-imagefree2api-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── 代理配置（可选） ──
# 如果服务器无法直连 imagefree.org，可配置 SOCKS5/HTTP 代理
proxy:
  enabled: false
  url: "socks5://localhost:7891"

# ── 生成参数 ──
generation:
  max_concurrency: 6          # 最大并发生成数
  request_interval: 30        # 多图生成间隔（秒）
  output_dir: "/output/images"
  session_pool:
    enabled: true
    session_count: 6
    max_concurrent_per_session: 1
    cooldown_seconds: 60
    wait_timeout_seconds: 180
